name: Verify KAIRO MVP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Lint checks
      run: npm run lint

    - name: Build assets
      run: npm run build

    - name: Verify copy rules
      run: npm run verify:copy

    - name: Verify API routes mapping
      run: npm run verify:routes
